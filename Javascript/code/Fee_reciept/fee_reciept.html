<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fees Receipt Form</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #050505, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px 35px;
      border-radius: 15px;
      width: 380px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      font-weight: 600;
      display: block;
      margin-top: 12px;
      color: #444;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #000000;
      outline: none;
      box-shadow: 0 0 5px rgba(79,172,254,0.6);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #000000;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #323334;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>KIET University</h1>

    <form id="receiptForm">

      <label>Student Name</label>
      <input id="name" type="text" required />

      <label>University Roll No.</label>
      <input id="roll" type="number" required />

      <label>Branch</label>
      <select id="branch" required>
        <option value="">Select Branch</option>
        <option>CSE</option>
        <option>CSE AIML</option>
        <option>CSE AI</option>
        <option>CS</option>
        <option>IT</option>
        <option>CSIT</option>
        <option>ECE</option>
        <option>ELCE</option>
        <option>EEE</option>
        <option>ME</option>
      </select>

      <label>Semester</label>
      <select id="sem" required>
        <option value="">Select Semester</option>
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
      </select>

      <label>Fee Amount</label>
      <input id="amount" type="number" required />

      <label>Date</label>
      <input id="date" type="date" required />

      <button id="submitBtn" type="submit" disabled>Submit</button>

    </form>
  </div>

  <script>
    const form = document.getElementById("receiptForm");
    const submitBtn = document.getElementById("submitBtn");

    const fields = ["name", "roll", "branch", "sem", "amount", "date"];

    function validateForm() {
      const allFilled = fields.every(id =>
        document.getElementById(id).value.trim() !== ""
      );
      submitBtn.disabled = !allFilled;
    }

    fields.forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener("input", validateForm);
      el.addEventListener("change", validateForm);
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      alert("Form Submitted Successfully!!!");
    });
  </script>

</body>
</html>
