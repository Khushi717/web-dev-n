<body>
    <h2>Password Strength with Checklist</h2>
    <input type="password" id="password" plsceholder="Enter Password">

  <li id="uppercase"> At least one uppercase letter (A-Z)</li>
  <li id="number"> At least one number (0-9)</li>
  <li id="special"> At least one special character (@#$%^&*)</li>
  <li id="length"> Minimum 8 characters</li>
    </ul>
